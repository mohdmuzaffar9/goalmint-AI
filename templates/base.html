<!DOCTYPE html>
<html>

<head>

    <title>GoalMint AI</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

</head>

<body class="bg-light">

    <nav class="navbar navbar-dark bg-primary shadow-sm">

        <div class="container-fluid">

            <a class="navbar-brand fw-bold" href="/">

                GoalMint AI

            </a>

            <div class="text-white">

                <i class="bi bi-person-circle me-2"></i>

                {{ request.user.first_name }}

            </div>

        </div>

    </nav>

    <div class="container-fluid">

        <div class="row">

            <!-- Sidebar -->

            <div class="col-md-2 bg-white border-end vh-100 p-3">

                <h5 class="fw-bold mb-4">

                    Menu

                </h5>

                <div class="list-group">

                    <a href="/" class="list-group-item list-group-item-action">

                        <i class="bi bi-speedometer2 me-2"></i>

                        Dashboard

                    </a>

                    <a href="/goals/my-goals/" class="list-group-item list-group-item-action">

                        <i class="bi bi-bullseye me-2"></i>

                        My Goals

                    </a>

                    <a href="/goals/create/" class="list-group-item list-group-item-action">

                        <i class="bi bi-plus-circle me-2"></i>

                        Create Goal

                    </a>

                    <a href="#" class="list-group-item list-group-item-action">

                        <i class="bi bi-list-check me-2"></i>

                        Tasks

                    </a>

                    <a href="#" class="list-group-item list-group-item-action">

                        <i class="bi bi-robot me-2"></i>

                        AI Insights

                    </a>

                    <a href="/accounts/logout/" class="list-group-item list-group-item-action text-danger">

                        <i class="bi bi-box-arrow-right me-2"></i>

                        Logout

                    </a>

                </div>

            </div>

            <!-- Main Content -->

            <div class="col-md-10 p-4">

                {% block content %}

                {% endblock %}

            </div>

        </div>

    </div>

</body>

</html>
