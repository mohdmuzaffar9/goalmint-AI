<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login • GoalMint AI</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    {% load static %}

    <link rel="stylesheet" href="{% static 'css/auth.css' %}">

</head>

<body>

<div class="auth-wrapper">

    <div class="auth-card">

        <div class="auth-logo">

            <h2>
                GoalMint AI
            </h2>

            <p>
                Turn Goals Into Actionable Success Plans
            </p>

        </div>

        <h3 class="auth-title">

            Welcome Back 👋

        </h3>

        {% if messages %}

            {% for message in messages %}

                <div class="alert alert-danger">

                    {{ message }}

                </div>

            {% endfor %}

        {% endif %}

        <form method="POST">

            {% csrf_token %}

            {{ form.as_p }}

            <button
                type="submit"
                class="btn btn-primary auth-btn">

                Login

            </button>

        </form>

        <div class="auth-footer">

            Don't have an account?

            <a href="{% url 'register' %}">

                Register

            </a>

        </div>

    </div>

</div>

</body>

</html>
