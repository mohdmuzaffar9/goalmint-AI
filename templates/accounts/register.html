<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Create Account • GoalMint AI</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    {% load static %}

    <link rel="stylesheet" href="{% static 'css/auth.css' %}">

</head>

<body>

<div class="auth-wrapper">

    <div class="auth-card">

        <div class="auth-logo">

            <h2>

                GoalMint AI

            </h2>

            <p>

                Turn Goals Into Actionable Success Plans

            </p>

        </div>

        <h3 class="auth-title">

            Create Your Account 🚀

        </h3>

        {% if form.errors %}

            <div class="alert alert-danger">

                Please correct the errors below.

            </div>

        {% endif %}

        <form method="POST">

            {% csrf_token %}

            {{ form.as_p }}

            <button
                type="submit"
                class="btn btn-primary auth-btn">

                Create Account

            </button>

        </form>

        <div class="auth-footer">

            Already have an account?

            <a href="{% url 'login' %}">

                Login

            </a>

        </div>

    </div>

</div>

</body>

</html>
