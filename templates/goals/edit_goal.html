<!DOCTYPE html>

<html>

<head>

```
<title>Edit Goal</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
```

</head>

<body>

<div class="container mt-5">

```
<div class="card shadow">

    <div class="card-body">

        <h2 class="mb-4">
            Edit Goal
        </h2>

        <h5 class="text-muted">
            {{ goal.title }}
        </h5>

        <form method="POST">

            {% csrf_token %}

            {{ form.as_p }}

            <button
                type="submit"
                class="btn btn-success"
            >
                Save Changes
            </button>

            <a
                href="/goals/{{ goal.id }}/"
                class="btn btn-secondary"
            >
                Cancel
            </a>

        </form>

    </div>

</div>
```

</div>

</body>

</html>
