
{% extends 'base.html' %}

{% block content %}

<div class="page-header">

    <div>

        <h2 class="page-title">

            Edit Goal

        </h2>

        <p class="page-subtitle">

            Update your goal settings and keep your progress on track.

        </p>

    </div>

</div>



<div class="row justify-content-center">

    <div class="col-lg-10">

        <div class="content-card">

            <h4 class="mb-4">

                {{ goal.title }}

            </h4>

            <div class="row mb-4">

                <div class="col-md-6">

                    <label class="form-label fw-semibold">

                        Goal Type

                    </label>

                    <input type="text" class="form-control" value="{{ goal.goal_type }}" readonly>

                </div>

                <div class="col-md-6">

                    <label class="form-label fw-semibold">

                        Category

                    </label>

                    <input type="text" class="form-control" value="{{ goal.goal_category }}" readonly>

                </div>

            </div>

            <hr class="mb-4">

            <form method="POST">

                {% csrf_token %}

                <div class="row">

                    <div class="col-md-6 mb-4">

                        <label class="form-label fw-semibold">

                            Priority

                        </label>

                        {{ form.priority }}

                    </div>

                    <div class="col-md-6 mb-4">

                        <label class="form-label fw-semibold">

                            Status

                        </label>

                        {{ form.status }}

                    </div>

                    <div class="col-md-6 mb-4">

                        <label class="form-label fw-semibold">

                            Daily Hours

                        </label>

                        {{ form.daily_hours }}

                    </div>

                    <div class="col-md-6 mb-4">

                        <label class="form-label fw-semibold">

                            Target Date

                        </label>

                        {{ form.target_date }}

                    </div>

                </div>

                <hr>

                <div class="d-flex justify-content-end gap-2">

                    <a href="/goals/{{ goal.id }}/" class="btn btn-outline-secondary">

                        <i class="bi bi-arrow-left me-2"></i>

                        Cancel

                    </a>

                    <button type="submit" class="btn btn-success">

                        <i class="bi bi-check-circle me-2"></i>

                        Save Changes

                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
