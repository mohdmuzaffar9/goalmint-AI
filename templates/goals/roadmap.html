<!DOCTYPE html>
<html>

<head>
    <title>Roadmap</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h2 class="mb-4">
        {{ goal.title }} Roadmap
    </h2>

    {% for phase in roadmaps %}

    <div class="card mb-3 shadow-sm">

        <div class="card-body">

            <h5>
                Phase {{ phase.order }}
            </h5>

            <p>
                {{ phase.title }}
            </p>

        </div>

    </div>

    {% endfor %}

    <a href="/goals/{{ goal.id }}/" class="btn btn-secondary">
        Back
    </a>

</div>

</body>

</html>
