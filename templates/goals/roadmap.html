<!DOCTYPE html>
<html>

<head>
    <title>Roadmap</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div class="container mt-5">

        <h2 class="mb-4">
            {{ goal.title }} Roadmap
        </h2>

        {% for phase in roadmaps %}

        <div class="card mb-3 shadow-sm">

            <div class="card-body">

                <h5>
                    Phase {{ phase.order }}
                </h5>

                <p>
                    {{ phase.title }}
                </p>

                <div class="mt-3">

                    {% if phase.tasks.exists %}

                    <a href="/tasks/{{ phase.id }}/" class="btn btn-primary">
                        View Tasks
                    </a>

                    {% else %}

                    <a href="/tasks/generate/{{ phase.id }}/" class="btn btn-success">
                        Generate Tasks
                    </a>

                    {% endif %}

                </div>

            </div>

        </div>

        {% endfor %}

        <a href="/goals/{{ goal.id }}/" class="btn btn-secondary">
            Back
        </a>

    </div>

</body>

</html>
