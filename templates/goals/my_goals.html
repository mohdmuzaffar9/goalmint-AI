<!DOCTYPE html>
<html>

<head>
    <title>My Goals</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div class="container mt-5">

        <h2 class="mb-4">
            My Goals
        </h2>

        <a href="/goals/create/" class="btn btn-primary mb-3">
            Create New Goal
        </a>

        <table class="table table-bordered table-striped">

            <thead>

                <tr>
                    <th>Title</th>
                    <th>Type</th>
                    <th>Category</th>
                    <th>Priority</th>
                    <th>Status</th>
                    <th>Target Date</th>
                    <th>Action</th>
                </tr>

            </thead>

            <tbody>

                {% for goal in goals %}

                <tr>

                    <td>{{ goal.title }}</td>
                    <td>{{ goal.goal_type }}</td>
                    <td>{{ goal.goal_category }}</td>
                    <td>{{ goal.priority }}</td>
                    <td>{{ goal.status }}</td>
                    <td>{{ goal.target_date }}</td>
                    <td>
                        <a href="/goals/{{ goal.id }}/" class="btn btn-info btn-sm">
                            View Details 
                        </a>

                        <a href="/goals/{{ goal.id }}/edit/" class="btn btn-warning btn-sm">
                            Edit
                        </a>    
                        
                    </td>    



                </tr>

                {% empty %}

                <tr>

                    <td colspan="7" class="text-center">
                        No goals found.
                    </td>

                </tr>

                {% endfor %}

            </tbody>

        </table>

    </div>

</body>

</html>
