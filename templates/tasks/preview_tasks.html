<!DOCTYPE html>
<html>

<head>
    <title>AI Task Preview</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div class="container mt-5">

        <h2 class="mb-4">
            {{ roadmap.title }}
        </h2>

        <div class="card shadow">

            <div class="card-body">

                <h4>
                    AI Generated Tasks
                </h4>

                <form method="POST">

                    {% csrf_token %}

                    {% for task in task_steps %}

                    <div class="mb-3">

                        <label class="form-label">
                            Task {{ forloop.counter }}
                        </label>

                        <input type="text" name="task_{{ forloop.counter }}" value="{{ task }}" class="form-control">

                    </div>

                    {% endfor %}

                    <button type="submit" class="btn btn-warning">
                        Save Changes
                    </button>

                    <a href="/tasks/accept/{{ roadmap.id }}/" class="btn btn-success">
                        Accept Tasks
                    </a>

                    <a href="/goals/{{ roadmap.goal.id }}/roadmap/" class="btn btn-secondary">
                        Back to Roadmap
                    </a>

                </form>

            </div>

        </div>

    </div>

</body>

</html>
