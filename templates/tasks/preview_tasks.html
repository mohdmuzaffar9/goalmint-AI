<!DOCTYPE html>
<html>

<head>
    <title>AI Task Preview</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div class="container mt-5">

        <h2 class="mb-4">
            {{ roadmap.title }}
        </h2>

        <div class="card shadow">

            <div class="card-body">

                <h4>
                    AI Generated Tasks
                </h4>

                <ul class="mt-3">

                    {% for task in task_steps %}

                    <li>
                        {{ task }}
                    </li>

                    {% endfor %}

                </ul>

            </div>

        </div>

    </div>

    <div class="mt-4">

        <a href="/tasks/accept/{{ roadmap.id }}/" class="btn btn-success">
            Accept Tasks
        </a>

        <a href="/goals/{{ roadmap.goal.id }}/roadmap/" class="btn btn-secondary">
            Back to Roadmap
        </a>

    </div>
</body>

</html>
