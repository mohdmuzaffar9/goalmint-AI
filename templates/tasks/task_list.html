<!DOCTYPE html>
<html>

<head>

    <title>Tasks</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <h2 class="mb-4">
        {{ roadmap.title }}
    </h2>

    <div class="card shadow">

        <div class="card-body">

            <h4>
                Saved Tasks
            </h4>

            <ul class="mt-3">

                {% for task in tasks %}

                <li>
                    {{ task.title }}
                </li>

                {% empty %}

                <li>
                    No tasks found.
                </li>

                {% endfor %}

            </ul>

            <a
                href="/goals/{{ roadmap.goal.id }}/roadmap/"
                class="btn btn-secondary mt-3"
            >
                Back to Roadmap
            </a>

        </div>

    </div>

</div>

</body>

</html>
