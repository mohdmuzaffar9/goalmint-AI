<!DOCTYPE html>
<html>

<head>

    <title>Tasks</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <h2 class="mb-4">
        {{ roadmap.title }}
    </h2>

    <div class="card shadow">

        <div class="card-body">

            <h4 class="mb-4">
                Saved Tasks
            </h4>

            <table class="table table-bordered table-striped">

                <thead>

                    <tr>
                        <th>Task</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>

                </thead>

                <tbody>

                    {% for task in tasks %}

                    <tr>

                        <td>
                            {{ task.title }}
                        </td>

                        <td>

                            <form
                            method="POST"
                            action="/tasks/status/{{ task.id }}/"
                            >

                                {% csrf_token %}

                                <select
                                name="status"
                                class="form-select"
                                >

                                    <option value="Pending"
                                    {% if task.status == 'Pending' %}
                                    selected
                                    {% endif %}
                                    >
                                        Pending
                                    </option>

                                    <option value="In Progress"
                                    {% if task.status == 'In Progress' %}
                                    selected
                                    {% endif %}
                                    >
                                        In Progress
                                    </option>

                                    <option value="Completed"
                                    {% if task.status == 'Completed' %}
                                    selected
                                    {% endif %}
                                    >
                                        Completed
                                    </option>

                                    <option value="Missed"
                                    {% if task.status == 'Missed' %}
                                    selected
                                    {% endif %}
                                    >
                                        Missed
                                    </option>

                                </select>

                        </td>

                        <td>

                                <button
                                class="btn btn-primary btn-sm"
                                >
                                    Update
                                </button>

                            </form>

                        </td>

                    </tr>

                    {% empty %}

                    <tr>

                        <td colspan="3" class="text-center">
                            No tasks found.
                        </td>

                    </tr>

                    {% endfor %}

                </tbody>

            </table>

            <a
                href="/goals/{{ roadmap.goal.id }}/roadmap/"
                class="btn btn-secondary"
            >
                Back to Roadmap
            </a>

        </div>

    </div>

</div>

</body>

</html>os
